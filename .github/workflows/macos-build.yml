name: macOS Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build MailLoom
        run: |
          xcodebuild \
            -project MailLoom.xcodeproj \
            -scheme EmailSender \
            -destination "platform=macOS" \
            clean build
